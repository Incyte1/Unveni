services:
  - type: web
    name: unveni-api
    runtime: python
    plan: starter
    rootDir: services/api
    buildCommand: pip install -e .[dev]
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://your-pages-project.pages.dev
      - key: DATA_PROVIDER
        value: licensed
      - key: DATABASE_URL
        fromDatabase:
          name: unveni-postgres
          property: connectionString

  - type: worker
    name: unveni-pipeline
    runtime: python
    plan: starter
    rootDir: services/pipeline
    buildCommand: pip install -e .
    startCommand: python -m pipeline loop
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: unveni-postgres
          property: connectionString

  - type: cron
    name: unveni-daily-candidate-build
    runtime: python
    plan: starter
    rootDir: services/pipeline
    schedule: "0 12 * * 1-5"
    buildCommand: pip install -e .
    startCommand: python -m pipeline build-candidates
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: unveni-postgres
          property: connectionString

databases:
  - name: unveni-postgres
    plan: basic-256mb
    databaseName: unveni
    user: unveni

